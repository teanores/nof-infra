name: NOF release-builder

on:
  workflow_dispatch:
    inputs:
      service:
        description: "NOF service key"
        required: true
        type: choice
        options:
          - nof-mp
          - nof-tt
          - nof-ht
      ref:
        description: "Semver tag to deploy, for example v0.2.35"
        required: true
        type: string
      approval_id:
        description: "Owner approval / tracker evidence id"
        required: true
        type: string
      execute_deploy:
        description: "Run production deploy on hbl. Leave false for validation only."
        required: true
        type: boolean
        default: false
      nof_ht_migration_gate_approved:
        description: "Legacy compatibility input; nof-ht migration gate is closed."
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: nof-release-builder-hbl-${{ inputs.service }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release request
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      service: ${{ steps.validate.outputs.service }}
      ref: ${{ steps.validate.outputs.ref }}
    steps:
      - name: Checkout nof-infra
        uses: actions/checkout@v4

      - name: Validate inputs and desired-state policy
        id: validate
        shell: bash
        env:
          SERVICE: ${{ inputs.service }}
          REF: ${{ inputs.ref }}
          APPROVAL_ID: ${{ inputs.approval_id }}
        run: |
          set -euo pipefail

          case "$SERVICE" in
            nof-mp|nof-tt|nof-ht) ;;
            *) echo "Unsupported service: $SERVICE" >&2; exit 64 ;;
          esac

          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release ref must be a semver tag, got: $REF" >&2
            exit 64
          fi

          if [[ -z "${APPROVAL_ID// }" ]]; then
            echo "approval_id is required and must reference owner approval/evidence." >&2
            exit 64
          fi

          awk -F '\t' '
            BEGIN { ok=1 }
            /^#/ || NF == 0 { next }
            NF != 3 { print "Invalid desired-state row: " $0 > "/dev/stderr"; ok=0; next }
            $1 !~ /^(nof-mp|nof-tt|nof-ht)$/ { print "Unknown service: " $1 > "/dev/stderr"; ok=0 }
            $2 !~ /^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$/ { print "Non-semver ref for " $1 ": " $2 > "/dev/stderr"; ok=0 }
            $3 !~ /^(true|false)$/ { print "Invalid enabled flag for " $1 ": " $3 > "/dev/stderr"; ok=0 }
            $3 == "true" { enabled += 1 }
            END {
              if (enabled > 1) {
                print "Routine desired-state policy allows at most one enabled row" > "/dev/stderr";
                ok=0
              }
              exit ok ? 0 : 1
            }
          ' environments/hbl/desired-state.tsv

          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Explain dry-run result
        if: ${{ !inputs.execute_deploy }}
        run: |
          echo "Validation passed."
          echo "execute_deploy=false, so no production deploy was attempted."

  deploy:
    name: Deploy through hbl release-builder
    needs: validate
    if: ${{ inputs.execute_deploy }}
    runs-on: [self-hosted, linux, nof-infra]
    environment: hbl-production
    timeout-minutes: 60
    steps:
      - name: Confirm hbl release-builder
        shell: bash
        run: |
          set -euo pipefail
          test -x /opt/nof-release-builder/nof-release-builder.sh
          /opt/nof-release-builder/nof-release-builder.sh list

      - name: Deploy approved service tag
        shell: bash
        env:
          SERVICE: ${{ needs.validate.outputs.service }}
          REF: ${{ needs.validate.outputs.ref }}
          APPROVAL_ID: ${{ inputs.approval_id }}
          NOF_RELEASE_APPROVAL_ID: ${{ inputs.approval_id }}
        run: |
          set -euo pipefail

          echo "Deploy mode: github-runner release-builder"
          echo "Service: $SERVICE"
          echo "Ref: $REF"
          echo "Approval/evidence: $APPROVAL_ID"

          /opt/nof-release-builder/nof-release-builder.sh deploy "$SERVICE" "$REF"

      - name: Show latest evidence files
        shell: bash
        env:
          SERVICE: ${{ needs.validate.outputs.service }}
        run: |
          set -euo pipefail
          evidence_dir="${NOF_RELEASE_ROOT:-$HOME/nof-release-builder}/evidence"
          echo "Evidence directory: $evidence_dir"
          find "$evidence_dir" -maxdepth 1 -type f -name "${SERVICE}-*.txt" -printf '%T@ %p\n' \
            | sort -nr \
            | head -5 \
            | cut -d' ' -f2-
