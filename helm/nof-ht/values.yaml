image:
  repository: localhost:32000/nof-ht
  tag: latest
  pullPolicy: Always

replicas: 1

# nof-infra owns deployment shape. Secret values stay in Kubernetes secrets
# nof-ht-secrets and nof-ht-oauth-secrets, never in this repository.
nextauthUrl: "https://habit-tracker.forgath.ru"
canonicalUrl: "https://habit-tracker.forgath.ru"
telegramBotUsername: "nof_sentinel_bot"
telegramBotId: "8750634200"
# Shared public NOF community/product bot. nof-ht uses it for habits/LLM/ideas.
# Identity/linking bot is @nof_sentinel_bot.
telegramHabitBotUsername: "naragothal_bot"
appVersion: "1.33.59"

# nof-mp OIDC Phase 2 metadata for nof-ht.
# Client secret value stays in Kubernetes Secret `nof-ht-oauth-secrets`
# as key `NOFMP_CLIENT_SECRET`; do not commit secret values here.
nofMpOidc:
  clientId: "nof-ht"
  issuer: "https://forgath.ru"

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
