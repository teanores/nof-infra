apiVersion: apps/v1
kind: Deployment
metadata:
  name: nof-ht
  namespace: nof-apps
  labels:
    app: nof-ht
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: nof-ht
  template:
    metadata:
      labels:
        app: nof-ht
    spec:
      containers:
        - name: nof-ht
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: nof-ht-secrets
            - secretRef:
                # Expected Phase 2 OIDC keys include NOFMP_CLIENT_SECRET.
                # Secret values remain in Kubernetes, never in git.
                name: nof-ht-oauth-secrets
            - secretRef:
                name: nof-ht-habit-bot-secrets
            - configMapRef:
                name: nof-ht-config
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
