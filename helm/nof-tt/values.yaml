replicaCount: 1

image:
  repository: localhost:32000/nof-tt
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 3000
  nodePort: null

env:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  DB_SERVER: "postgres"
  DB_PORT: "5432"
  NOF_TT_DB_SCHEMA: "forge_tasks"
  NOF_PLATFORM_ORIGIN: "https://forgath.ru"
  NEXT_PUBLIC_PLATFORM_ORIGIN: "https://forgath.ru"
  NOF_TT_ORIGIN: "https://task-tracker.forgath.ru"
  NEXT_PUBLIC_NOF_TT_ORIGIN: "https://task-tracker.forgath.ru"
  NOF_TT_INTERNAL_ORIGIN: "http://127.0.0.1:3000"
  NOF_PLATFORM_OAUTH_ISSUER: "https://forgath.ru"

secretEnv:
  DB_USER:
    secretName: postgres-secret
    key: postgres-user
  DB_PASS:
    secretName: postgres-secret
    key: postgres-password
  DB_NAME:
    secretName: postgres-secret
    key: postgres-db
  SECRET_KEY:
    secretName: dragon-forge-secrets
    key: SECRET_KEY
  NOF_TT_MCP_TOKEN_SECRET:
    secretName: nof-tt-mcp-secrets
    key: NOF_TT_MCP_TOKEN_SECRET
  BOT_API_KEY:
    secretName: bot-secrets
    key: bot-api-key
  NOF_SECURITY_AUDIT_INGEST_TOKEN:
    secretName: nof-tt-security-audit
    key: edge-ingest-token
  NOF_PLATFORM_OAUTH_JWT_SECRET:
    secretName: nof-tt-oauth-secrets
    key: NOF_PLATFORM_OAUTH_JWT_SECRET
  NOF_TT_OAUTH_CLIENT_SECRET:
    secretName: nof-tt-oauth-secrets
    key: NOF_TT_OAUTH_CLIENT_SECRET

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
